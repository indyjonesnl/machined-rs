# Pinned external artifacts. Every input to an image build is named here with
# url + sha256; the fetcher refuses anything else. Re-pin deliberately.
# kind = "apk": Alpine package, extracted into the initramfs rootfs.
#
# Source: Alpine v3.21 main/x86_64 (dl-cdn.alpinelinux.org), pinned 2026-06.
#
# What each apk provides, and why it's here:
#   linux-virt   boot/vmlinuz-virt + lib/modules/6.12.93-0-virt/* (modules.dep
#                + the virtio/ext4/vfat/nls .ko.gz the closure resolver needs).
#   musl         /lib/ld-musl-x86_64.so.1 (the ELF interpreter for every binary
#                below) + libc.musl-x86_64.so.1.
#   e2fsprogs    sbin/mke2fs (sbin/mkfs.ext4 -> mke2fs symlink) — the formatter
#                machined runs inside the initramfs.
#
# mkfs.ext4 (= mke2fs) NEEDED-lib closure, each NEEDED resolved to its apk:
#   libext2fs.so.2          e2fsprogs-libs   (NEEDED: libcom_err)
#   libe2p.so.2             e2fsprogs-libs
#   libcom_err.so.2         libcom_err
#   libblkid.so.1           libblkid         (NEEDED: libeconf)
#   libeconf.so.0           libeconf
#   libuuid.so.1            libuuid
#   libc.musl-x86_64.so.1   musl
#   interpreter /lib/ld-musl-x86_64.so.1   musl
# (e2fsprogs-libs also ships libss.so.2, which mke2fs does not NEED.)

[artifact]
x86_64 = [
