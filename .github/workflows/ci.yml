name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # No system protoc needed: protobuf codegen uses protoc-bin-vendored.
      # The privileged test tier (make root-tests) is run manually on a host.
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace

  boot-test:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    # Runs inside the prebuilt CI tool image (Rust + musl target + QEMU +
    # musl-tools) published by ci-image.yml — no per-run toolchain/apt installs.
    # `--device /dev/kvm` passes the runner's KVM node through so QEMU keeps
    # hardware acceleration (container-root opens the 0660 root:kvm node via
    # CAP_DAC_OVERRIDE — validated locally; without it QEMU falls back to TCG).
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/indyjonesnl/machined-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --device /dev/kvm
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cache imager artifacts
        uses: actions/cache@v4
        with:
          path: target/imager-cache
          key: imager-artifacts-${{ hashFiles('crates/imager/artifacts.toml') }}
      - name: boot test
        timeout-minutes: 35
        run: make boot-test
      - name: upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-serial-log
          path: target/boot-test/serial.log
          if-no-files-found: ignore

  boot-test-aarch64:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    # Same prebuilt CI image, but boots an aarch64 image under
    # qemu-system-aarch64 -M virt. NO --device /dev/kvm: cross-arch emulation is
    # TCG (KVM can't accelerate a different arch), so it's slower — local TCG run
    # was ~1.5 min, the timeouts are generous. Proves the cross-compiled aarch64
    # binary + arm64 containerd actually boot and reach RuntimeReady.
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/indyjonesnl/machined-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cache imager artifacts
        uses: actions/cache@v4
        with:
          path: target/imager-cache
          key: imager-artifacts-${{ hashFiles('crates/imager/artifacts.toml') }}
      - name: boot test (aarch64)
        timeout-minutes: 35
        run: make boot-test-aarch64
      - name: upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-aarch64-serial-log
          path: target/boot-test/serial.log
          if-no-files-found: ignore

  boot-test-aarch64-mbr:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    # Boots an aarch64 MBR-partitioned image under -M virt and asserts machined
    # mounts the FAT /boot off the MBR disk. This covers the Raspberry Pi's MBR +
    # vfat /boot code path (GPT-read fails -> sysfs partition fallback -> mount
    # first vfat), which the raspi3ap job CANNOT exercise: qemu's raspi3 SD model
    # never exposes the MBR partition table to the kernel (mmcblk0pN is never
    # created). -M virt's virtio-blk does expose vda1, so the same MBR layout
    # boots there. Pure TCG (no KVM); the marker fires in seconds of guest time.
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/indyjonesnl/machined-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cache imager artifacts
        uses: actions/cache@v4
        with:
          path: target/imager-cache
          key: imager-artifacts-${{ hashFiles('crates/imager/artifacts.toml') }}
      - name: boot test (aarch64 MBR /boot on -M virt)
        timeout-minutes: 35
        run: make boot-test-aarch64-mbr
      - name: upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-aarch64-mbr-serial-log
          path: target/boot-test-mbr/serial.log
          if-no-files-found: ignore

  build-image-aarch64-rpi:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    # Same prebuilt CI image. NO qemu / --device /dev/kvm: the Pi 3 firmware
    # can't be emulated, so this job only builds the aarch64-rpi image and reads
    # the FAT back to assert the Pi boot files are staged. The node itself is
    # verified on real hardware. Proves the image builds + stages correctly.
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/indyjonesnl/machined-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cache imager artifacts
        uses: actions/cache@v4
        with:
          path: target/imager-cache
          key: imager-artifacts-${{ hashFiles('crates/imager/artifacts.toml') }}
      - name: build Pi 3A+ image (no boot)
        run: make build-image-aarch64-rpi

  boot-test-aarch64-rpi:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    # Boots the aarch64-rpi image under qemu-system-aarch64 -M raspi3ap (the Pi
    # 3A+ SoC model). NO --device /dev/kvm: cross-arch emulation is TCG. This
    # goes beyond build-image-aarch64-rpi (FAT readback only) by exercising the
    # SD controller (mmcblk0), the MBR read, and the vfat /boot mount on a
    # Pi-shaped machine. It does NOT model the VideoCore firmware handoff
    # (-kernel/-initrd stand in for it) — that is proven on real hardware.
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/indyjonesnl/machined-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cache imager artifacts
        uses: actions/cache@v4
        with:
          path: target/imager-cache
          key: imager-artifacts-${{ hashFiles('crates/imager/artifacts.toml') }}
      - name: boot test (aarch64-rpi, raspi3ap)
        timeout-minutes: 35
        run: make boot-test-aarch64-rpi
      - name: upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-aarch64-rpi-serial-log
          path: target/boot-test-rpi/serial.log
          if-no-files-found: ignore
